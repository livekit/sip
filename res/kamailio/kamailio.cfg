#!KAMAILIO
#
# Kamailio SBC configuration for LiveKit SIP Video Bridge
# Routes SIP video INVITEs to the video bridge backend on port 5080.
# This is a minimal reference config for development/testing.

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0

fork=yes
children=4

port=5060
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# Video bridge backend address
#!define VIDEO_BRIDGE_IP "127.0.0.1"
#!define VIDEO_BRIDGE_PORT 5080

####### Modules Section ########

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"

# TM params
modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 30000)

# RR params
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

####### Routing Logic ########

request_route {
    # Per-request initial checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # Record-Route for in-dialog requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle sequential (in-dialog) requests
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE")) {
                xlog("L_INFO", "BYE received for $ci\n");
            }
            route(RELAY);
            exit;
        }

        if (is_method("ACK")) {
            if (t_check_trans()) {
                route(RELAY);
                exit;
            }
            exit;
        }

        sl_send_reply("404", "Not Found");
        exit;
    }

    # Handle initial requests

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle INVITE — route to video bridge
    if (is_method("INVITE")) {
        # Check for video SDP (basic check for m=video)
        if (search_body("m=video")) {
            xlog("L_INFO", "Video INVITE from $fu to $tu — routing to video bridge\n");
            $du = "sip:" + VIDEO_BRIDGE_IP + ":" + VIDEO_BRIDGE_PORT;
            route(RELAY);
            exit;
        }

        # Audio-only calls: reject or route elsewhere
        xlog("L_INFO", "Audio-only INVITE from $fu — rejecting (no video)\n");
        sl_send_reply("488", "Not Acceptable Here — video required");
        exit;
    }

    # OPTIONS keepalive
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Default: reject
    sl_send_reply("405", "Method Not Allowed");
    exit;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
